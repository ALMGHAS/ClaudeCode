name: security

on:
  push:
    branches:
      - main
    paths-ignore:
      - "helm/**"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "helm/**"
      - "**/*.md"
  workflow_dispatch: 
  
  #schedule:
    # Weekly scan on Monday 06:00 UTC to catch newly disclosed CVEs
   # - cron: "0 6 * * 1"
  

permissions:
  contents: read
  security-events: write
  actions: read

env:
  JAVA_VERSION: "21"

jobs:
  codeql-sast:
    name: CodeQL SAST (Java)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-extended,security-and-quality

      - name: Build with Maven (no tests)
        run: mvn -B clean package -DskipTests=true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"

  trivy-filesystem:
    name: Trivy Filesystem Scan (dependencies)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy filesystem SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

      - name: Upload Trivy filesystem artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs.sarif

  trivy-config:
    name: Trivy IaC / Dockerfile Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy config scan (Dockerfile, k8s, helm)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0"

      - name: Upload Trivy config SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      - name: Upload Trivy config artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-config-report
          path: trivy-config.sarif

  trivy-secrets:
    name: Trivy Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so secrets introduced in earlier commits are detected
          fetch-depth: 0

      - name: Trivy secret scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-secrets.sarif
          scanners: secret
          exit-code: "1"

      - name: Upload Trivy secrets SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-secrets.sarif
          category: trivy-secrets

      - name: Upload Trivy secrets artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-secrets-report
          path: trivy-secrets.sarif
